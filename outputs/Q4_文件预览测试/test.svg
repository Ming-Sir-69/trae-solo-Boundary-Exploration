<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#f0f4f8" rx="10" ry="10"/>

  <!-- 标题 -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">
    Trae SOLO SVG 预览测试
  </text>

  <!-- 圆形 -->
  <circle cx="120" cy="150" r="60" fill="#3498db" stroke="#2980b9" stroke-width="3" opacity="0.9"/>
  <text x="120" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">
    圆形
  </text>

  <!-- 矩形 -->
  <rect x="220" y="90" width="120" height="120" fill="#e74c3c" stroke="#c0392b" stroke-width="3" rx="8" ry="8" opacity="0.9"/>
  <text x="280" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">
    矩形
  </text>

  <!-- 三角形 -->
  <polygon points="200,230 140,280 260,280" fill="#2ecc71" stroke="#27ae60" stroke-width="3" opacity="0.9"/>
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">
    三角形
  </text>

  <!-- 装饰线 -->
  <line x1="20" y1="250" x2="380" y2="250" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- 底部文字 -->
  <text x="200" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">
    SVG 矢量图 - 2026-04-18
  </text>
</svg>
